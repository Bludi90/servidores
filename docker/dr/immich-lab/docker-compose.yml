name: immich-lab

services:
  database:
    image: ${IMMICH_DB_IMAGE:-ghcr.io/immich-app/postgres:14-vectorchord0.4.3-pgvectors0.2.0@sha256:bcf63357191b76a916ae5eb93464d65c07511da41e3bf7a8416db519b40b1c23}
    container_name: ${IMMICH_DB_CONTAINER_NAME:-immich-postgres-lab}
    env_file:
      - .env.db
    volumes:
      - ${IMMICH_DB_PATH}:/var/lib/postgresql/data
    shm_size: 128mb
    restart: unless-stopped

  redis:
    image: ${IMMICH_REDIS_IMAGE:-docker.io/valkey/valkey:8@sha256:81db6d39e1bba3b3ff32bd3a1b19a6d69690f94a3954ec131277b9a26b95b3aa}
    container_name: ${IMMICH_REDIS_CONTAINER_NAME:-immich-redis-lab}
    restart: unless-stopped

  immich-server:
    image: ${IMMICH_SERVER_IMAGE:-ghcr.io/immich-app/immich-server:v2}
    container_name: ${IMMICH_SERVER_CONTAINER_NAME:-immich-server-lab}
    env_file:
      - .env.server
    ports:
      - "${IMMICH_BIND_IP:-127.0.0.1}:${IMMICH_BIND_PORT:-12283}:2283"
    depends_on:
      - redis
      - database
    volumes:
      - ${IMMICH_UPLOADS_PATH}:/data
      - /etc/localtime:/etc/localtime:ro
    restart: unless-stopped
